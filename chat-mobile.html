<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Copa do Mundo Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    background: #16213e;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-info h1 { font-size: 15px; font-weight: 600; color: #fff; }
  .header-info p {
    font-size: 12px; color: #4caf50;
    display: flex; align-items: center; gap: 4px;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: #4caf50;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .message {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot  { align-self: flex-start; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    margin-top: 2px;
  }
  .bot  .avatar { background: linear-gradient(135deg, #f7971e, #ffd200); }
  .user .avatar { background: #0f3460; color: #fff; font-size: 12px; font-weight: 600; }
  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .bot .bubble {
    background: #16213e;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .user .bubble {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e;
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }
  .meta { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; padding: 0 4px; }
  .user .meta { text-align: right; }
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 16px;
  }
  .typing span {
    width: 8px; height: 8px;
    background: #f7971e;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
  .suggestions {
    padding: 0 16px 8px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .suggestions::-webkit-scrollbar { display: none; }
  .suggestion {
    background: rgba(247,151,30,.15);
    border: 1px solid rgba(247,151,30,.4);
    border-radius: 20px;
    padding: 6px 14px;
    color: #ffd200;
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }
  .input-area {
    background: #16213e;
    padding: 10px 12px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    border-top: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 20px;
    padding: 10px 16px;
    color: #fff;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 100px;
    min-height: 40px;
    line-height: 1.4;
    font-family: inherit;
  }
  .input-area textarea::placeholder { color: rgba(255,255,255,.4); }
  .send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
  }
  .send-btn:disabled { opacity: .4; }
  .error-bubble {
    background: rgba(220,53,69,.2);
    border: 1px solid rgba(220,53,69,.4);
    color: #ff6b6b;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    margin: 0 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏆</div>
  <div class="header-info">
    <h1>Copa do Mundo Agent</h1>
    <p><span class="status-dot"></span> <span id="status-text">Conectando...</span></p>
  </div>
</div>

<div class="messages" id="messages">
  <div class="message bot">
    <div class="avatar">🏆</div>
    <div>
      <div class="bubble">
        Olá! Sou o especialista em Copa do Mundo FIFA. Posso responder sobre campeões, artilheiros, curiosidades e muito mais!<br><br>
        <strong>Como posso ajudar?</strong>
      </div>
      <div class="meta">Agora</div>
    </div>
  </div>
</div>

<div class="suggestions">
  <div class="suggestion" onclick="sendSuggestion(this)">🇧🇷 Títulos do Brasil</div>
  <div class="suggestion" onclick="sendSuggestion(this)">⚽ Maior artilheiro</div>
  <div class="suggestion" onclick="sendSuggestion(this)">🏅 Copa 1970</div>
  <div class="suggestion" onclick="sendSuggestion(this)">📅 Copa 2026</div>
  <div class="suggestion" onclick="sendSuggestion(this)">🌟 Pelé e Maradona</div>
</div>

<div class="input-area">
  <textarea id="msg-input" placeholder="Pergunte sobre a Copa..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
  // ── URL da API detectada automaticamente da origem da página ──────────────
  // Quando acessado via http://IP:8000/chat, usa a mesma origem
  const API_BASE = window.location.origin;

  const SESSION_ID = 'session-' + Math.random().toString(36).substr(2, 8);
  let isLoading = false;

  // Verifica conexão automaticamente ao carregar a página
  async function checkConnection() {
    const statusEl = document.getElementById('status-text');
    try {
      const res = await fetch(API_BASE + '/api/v1/health', {
        signal: AbortSignal.timeout(5000)
      });
      if (res.ok) {
        statusEl.textContent = 'Online ✓';
        statusEl.style.color = '#4caf50';
      } else {
        statusEl.textContent = 'Erro na API';
        statusEl.style.color = '#ff6b6b';
      }
    } catch {
      statusEl.textContent = 'Sem conexão';
      statusEl.style.color = '#ff6b6b';
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(el) {
    const text = el.textContent.replace(/^[^\s]+\s/, '');
    document.getElementById('msg-input').value = text;
    sendMessage();
  }

  function formatTime() {
    return new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  }

  function addMessage(text, role, meta='') {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const avatar = role === 'bot' ? '🏆' : 'EU';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div>
        <div class="bubble">${text.replace(/\n/g,'<br>')}</div>
        <div class="meta">${formatTime()}${meta ? ' · '+meta : ''}</div>
      </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">🏆</div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    addMessage(text, 'user');
    addTyping();

    try {
      const res = await fetch(API_BASE + '/api/v1/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text, session_id: SESSION_ID}),
        signal: AbortSignal.timeout(30000),
      });

      removeTyping();
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();
      const routeMap = {rag:'📚 RAG', api:'🌐 API', direct:'💬 Direto', off_topic:'🚫 Off-topic'};
      const route = routeMap[data.intent] || '';
      const latency = data.latency_ms ? Math.round(data.latency_ms/1000)+'s' : '';
      addMessage(data.response, 'bot', [route, latency].filter(Boolean).join(' · '));

    } catch (err) {
      removeTyping();
      const msgs = document.getElementById('messages');
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = err.message.includes('timeout')
        ? 'Tempo esgotado. Tente novamente.'
        : 'Erro ao conectar com a API.';
      msgs.appendChild(errDiv);
      msgs.scrollTop = msgs.scrollHeight;
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }

  checkConnection();
</script>
</body>
</html>
